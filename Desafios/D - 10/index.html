<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das Mensagens</title>
    <style>
        body {
            background-color: black;
            color: aliceblue;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        header {
            background-color: darkblue;
            margin: 6px;
            padding: 6px;
        }

        h1 {
            text-align: center;
            color: #06f706;
        }

        section > div > ul, li {
            list-style: none;
            max-width: 500px;
            margin: auto;
            text-align: center;
            border: 2px solid #ffb702;
            border-radius: 8px;
        }

        div > ul, li {
            background: white;
            color: darkviolet;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Desafio das Mensagens</h1>
    </header>
    <section>
        <div>
            <ul>
                <li>* Um</li>
                <li>** Dois</li>
                <li>*** Três</li>
                <li>**** Quatro</li>
            </ul>
        </div>
        <div>
            <ul>
                <li>**** Quatro</li>
                <li>*** três</li>
                <li>** Dois</li>
                <li>* Um</li>
            </ul>
        </div>
    </section>
</body>
</html>
