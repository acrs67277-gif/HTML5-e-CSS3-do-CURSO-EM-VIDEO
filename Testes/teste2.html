<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Desafio (parte 2)</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 8px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: auto;
            padding: 12px;
        }

        td {
            border: 2px solid #000000;
            padding: 10px;
        }

        td#cinza {
            text-align: center;
            background-color: aqua;
            color: #fd00be;
        }

        td > div.cinza {
            border: 1px solid black;
            border-radius: 10%;
            width: 60px;
            height: 60px;
            margin: auto;
            background-color: green;
        }

        td.cin, p {
            text-indent: 13px;
            padding: 16px;
            margin: 16px;
            text-align: center, justify;
            background-color: #fd00be;
            color: rgb(0, 0, 0);
        }

        td#circ {
            text-align: center;
            background-color: rgb(82, 82, 82);
        }

        td > section {
            background-color: #000000;
            border: 1px solid red;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            margin: auto;
        }

        td.r-001 > div {
            padding: 11px;
            margin: 11px;
            text-indent: 12px;
            background-color: #000;
            color: #fff;
            border: 4px solid red;
            border-radius: 5px;
        }

        td.r-001 > div, p#r-I {
            padding: 11px;
            margin: 11px;
            color: #fff;
            border-radius: 1em;
        }

    </style>
</head>
<body>

                    <i>

                    </i>
                </p>
            </td>
            <td id="circ" rowspan="2"><img src="img/ddd.png" alt="cículo"></td>
        </tr>
        <tr>
            <td rowspan="3"><section></section></td>
            <td rowspan="3">II</td>
            <td rowspan="3">III</td>
            <td rowspan="3" style="background-color: #000; color: antiquewhite;">IV</td>
        </tr>
        <tr>
            <td class="r-001" rowspan="2">

            </td>
