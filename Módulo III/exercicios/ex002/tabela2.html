<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        h1 {
            background-color: #000;
            color: white;
            padding: 9px;
        }

        table {
            width: 300px;
            height: 300px;
            border-collapse: separate;
            border: 2px solid #000;
            padding: 10px;
        }

        td {
            border: 2px solid #636161;
            padding: 7px;
            text-align: center; /* Alinhamento do texto*/
            vertical-align: middle; /* Alinhamento vertical*/
        }

        .numero {
            text-align: right;
            color: rgb(252, 0, 197);
        }

        .imagem {
            text-align: center;
            padding: 15px;
            border-radius: 5%;
        }
    </style>
</head>
<body>
     <h1>Alinhando o conteúdo em tabelas</h1>
   
    <table>
        <tr> <!-- Primeira linha -->
            <td>Lorem ipsum</td>
            <td>Java</td>
            <td class="numero">Kw-445</td>
            <td>Java Script</td>
        </tr>
        <tr> <!-- Segunda linha -->
            <td>Python</td>
            <td>Goku</td>
            <td class="numero">K-333</td>
            <td>Portugol</td>
        </tr>
        <tr> <!-- Terceira linha -->
            <td>Suntara</td>
            <td class="numero">J-1355</td>
            <td>Paisagem</td>
            <td>L-13</td>
        </tr>
        <tr> <!-- Quarta linha -->
            <td class="imagem"><img src="img/A-111.png" alt=""></td>
            <td>N-15</td>
            <td>O-16</td>
            <td class="numero">2989</td>
        </tr>
    </table>
</body>
</html>
