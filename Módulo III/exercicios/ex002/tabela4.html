<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            border: 4px solid #000000;
            border-radius: 0.5em;
            padding: 18px;
        }

        h1 {
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 400px;
            height: 400px;
            margin: auto;
        }

        td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de células</h1>
        <table>
            <tr>
                <td>Lorem-1</td>
                <td colspan="2">Lorem-2</td>
            </tr>
            <tr>
                <td>Lorem-4</td>
                <td rowspan="3">Lorem-5</td>
                <td rowspan="3">Lorem-6</td>
            </tr>
            <tr>
                <td>Lorem-7</td>
            </tr>
            <tr>
                <td>Lorem-11</td>
            </tr>
        </table>
</body>
</html>
