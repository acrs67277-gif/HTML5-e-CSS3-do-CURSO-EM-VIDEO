<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>
        body {
            background-color: #000000;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
        }

        h1 {
            color: #ffff00;
            text-align: center;
        }

        p {
            color: aliceblue;
            font-size: 2em;
        }

        a {
           text-decoration: none;
           color: #ffff00;
           text-align: center;  
           color: #a6a6a7;
           font-size: 1.2em;
        }

        div.iframe, p {
            background-color: aqua;
            color: #000000;
            max-width: 500px;
            margin: auto;
        }

        iframe#iframe-1 {
            width: 320px;
            height: 300px;
            border: 2px solid yellow;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1> 
        <!-- Tamanho padrão 300x150 --> 
        <div class="iframe">
            <p>
                <p>
                    <p>Acessando o site do para aprender a programar.</p>
                    <a href="https://www.cursoemvideo.com/" target="_blank">Curso em Video.</a> <br>
                    <iframe src="https://www.cursoemvideo.com/" frameborder="0" id="iframe-1">
                    </iframe>
                </
                <p>
                    <p>O site do é muito legal.</p>
                    <a href="https://python.org.br/" target="_blank">Python.org</a> <br>
                    <iframe src="https://python.org.br/" frameborder="0" id="iframe-1">
                    </iframe>
                </p>
            </p>     
        </div>                                                                
</body>
</html>
