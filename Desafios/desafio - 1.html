<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio - I</title>
    <style>
        table {
            border-collapse: separate;
            width: 100%;
        }

        th, td {
            border: 1px solid #062a8f;
            padding: 7px;
            text-align: center;
        }

        h1 {
            text-align: center;
            color: #ff0000;
            box-shadow: 11px 10px 9px #eb75897e;
        }
    </style>
</head>
<body>
    <h1>Desafio - I</h1>
    <table>
        <tr>
            <td colspan="5" style="color: #ffe605; background-color: #000;">A</td>
            <td rowspan="3" style="color: #ffe600; background-color: #000;">B</td>
        </tr>
        <tr>
            <td rowspan="4" style="color: #ffe600; background-color: #000;">C</td>
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td colspan="8" style="color: #ffe600; background-color: #000;">N</td>
        </tr>
    </table>
</body>
</html>
