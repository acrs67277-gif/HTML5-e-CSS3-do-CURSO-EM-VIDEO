<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio - II</title>
    <style>
        table {
            border-collapse: separate;
            width: 100%;
        }

        th, td {
            border: 1px solid rgb(17, 0, 255);
            padding: 7px;
            text-align: center;
        }

        h1 {
            text-align: center;
            color: #ff0000;
            box-shadow: 10px 9px 10px #ffc0cb81;
        }
    </style>
</head>
<body>
    <h1>Desafio - II</h1>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2" style="color: #ff0000; background-color: #000;">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <td rowspan="2" style="color: #ff0000; background-color: #000;">10</td>
            <td colspan="2" style="color: #ff0000; background-color: #000;">11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td>14</td>
            <td>15</td>
        </tr>
    </table>

</body>
</html>
