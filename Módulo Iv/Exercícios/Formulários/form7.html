<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <fieldset>
        <legend>Dados</legend>
        <form action="php/cadastro.php" method="post" autocomplete="on">

    <div>
        <label for="icor">Cor:</label>
        <input type="color" name="cor" id="icor" value="#00ff00">
    </div>

    <div>
        <label for="inivel">Nível de Satifação:</label>
        <input type="range" name="nivel" id="inivel" min="1" max="3" value="1">
    </div>

    <div>
        <label for="ifoto">Foto do perfil:</label>
        <input type="file" name="foto" id="ifoto">
    </div>

    <div>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </div>

    </form>
    </fieldset>

</body>
</html>
