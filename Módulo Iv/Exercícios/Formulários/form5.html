<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        div.for, div#for-1 {
            border: 1px solid #000;
            padding: 10px;
            margin: 10px auto;
        }

        div#for-2 {
            margin: 8px;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h1>Formulários com telefone e e-mail</h1>
    <fieldset>
        <legend>Dados pessoais</legend>
        <div class="for">
        <form action="php/cadastro.php" method="get" autocomplete="on">
            <div id="for-1">
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" minlength="5" maxlength="30" required>
            </div>
            <div id="for-1">
                <label for="iaemail">E-mail:</label>
                <input type="email" name="email" id="iemail" required autocomplete="email">
                <br><br>
                <label for="isenha">Senha:</label>
                <input type="password" name="senha" id="isenha">
            </div>

            <div #for-2>
                <label for="itel">Telefone:</label>
                <input type="tel" name="tel" id="itel" pattern="^[0-9]{4}-[0-9]{4}$" autocomplete="tel-national" required placeholder="(xx)xxxx-xxxx">
            </div>
    </fieldset>
            <!-- Estudar mais sobre RegEx -->
            <div id="for-2">
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </div>
        </form>
    </div>
</body>
</html>
