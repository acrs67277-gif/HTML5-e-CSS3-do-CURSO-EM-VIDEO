<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body {
            background-color: black;
            color: #fff;
        }
        div {
            background-color: #0000ff;
            color: #03ff03;
            margin: 10px;
            padding: 10px;
            border-radius: 0.5em;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <div>
        <form action="php/cadastro.php" method="get" autocomplete="on">
            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome completo" autocomplete="name" required>
            </p>
            <p>
                <label for="imedia">Média</label>
                <input type="number" name="media" id="imedia" min="0" max="10" placeholder="0 a 10" value="5" step="0.1" required>
            </p>
            <p>
                <label for="imes">Período Letivo</label>
                <input type="month" name="mes" id="imes" value="2026/06">
            </p>
            <p>
                <label for="idia">Dia da Prova</label>
                <input type="month" name="dia" id="idia" value="20260-06-22">
            </p>
            <label for="ihora">Horário da Prova</label>
            <input type="time" name="hora" id="ihora">
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </form>
    </div>
    
</body>
</html>
