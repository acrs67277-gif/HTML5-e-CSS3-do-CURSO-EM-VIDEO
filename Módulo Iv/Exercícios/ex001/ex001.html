<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            background-color: #ccc;
        }

        h1 {
            background-color: darkblue;
            color: aliceblue;
        }

        div.iframe {
            background-color: black;
            color: red;
            max-width: 500px;
            margin: auto;
            padding: 10px;
        }

        iframe {
            margin: 12px;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
        <div class="iframe">
            <p>
                <p>Acessando o site do para aprender a programar.</p>

                <iframe src="https://www.cursoemvideo.com/" frameborder="10">

                </iframe>
            </p>
  
            <p>
                <p>O site do é muito legal.</p>
   
                <iframe src="https://python.org.br/" frameborder="10">

                </iframe>
   
            </p>
        </div>
</body>
</html>
